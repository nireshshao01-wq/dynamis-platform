<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DYNAMIS Analytics</title>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/app.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   MAIN LAYOUT FIX
========================= */
.main{
margin-left:220px;
padding:30px;
}

.container{
max-width:1400px;
margin:0 auto;
}

/* =========================
   GRID FIX (CRITICAL)
========================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
gap:16px;
}

/* =========================
   CARDS
========================= */
.card{
background: rgba(2,6,23,0.85);
border:1px solid #1e293b;
padding:15px;
border-radius:12px;
}

/* =========================
   CHART SIZE FIX
========================= */
canvas{
max-height:300px !important;
}

/* =========================
   TITLE
========================= */
h1{
margin-bottom:20px;
}

h3{
font-size:14px;
margin-bottom:10px;
color:#94a3b8;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<h2>DYNAMIS</h2>

<a href="/dashboard.html">📊 Dashboard</a>
<a href="/analytics.html">📈 Analytics</a>
<a href="/revenue.html">💰 Revenue</a>
<a href="/clients.html">👥 Clients</a>

<br>
<button onclick="toggleTheme()">🌗 Theme</button>

</div>

<!-- MAIN -->
<div class="main">

<div class="container">

<h1>Analytics</h1>

<!-- TOP GRID -->
<div class="grid">

  <div class="card">
    <h3>Cloud Distribution</h3>
    <canvas id="vendorChart"></canvas>
  </div>

  <div class="card">
    <h3>Savings Breakdown</h3>
    <canvas id="savingsChart"></canvas>
  </div>

  <div class="card">
    <h3>Risk Analysis</h3>
    <canvas id="riskChart"></canvas>
  </div>

</div>

<br>

<!-- TREND -->
<div class="card">
  <h3>Monthly Spend Trend</h3>
  <canvas id="trendChart"></canvas>
</div>

</div>

</div>

<script src="/js/app.js"></script>
<script src="/js/analytics.js"></script>

</body>
</html>
