<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>DYNAMIS Login</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #020617, #020617 40%, #000);
  font-family:Arial;
  color:white;
}

/* 🔥 CENTER CONTAINER */
.wrapper{
  width:100%;
  max-width:420px;
  padding:20px;
}

/* 🔥 LOGIN CARD */
.card{
  background:#0f172a;
  padding:40px;
  border-radius:12px;
  border:1px solid #1e293b;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
  transition:all 0.3s ease;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 40px rgba(59,130,246,0.2);
}

/* 🔥 TITLE */
h2{
  text-align:center;
  margin-bottom:25px;
  color:#93c5fd;
}

/* 🔥 INPUTS */
input{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:none;
  border-radius:8px;
  background:#020617;
  border:1px solid #1e293b;
  color:white;
  font-size:14px;
}

input:focus{
  outline:none;
  border-color:#3b82f6;
}

/* 🔥 BUTTON */
button{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.3s ease;
}

button:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(59,130,246,0.4);
}

/* 🔥 SUBTEXT */
.sub{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  color:#64748b;
}

</style>

</head>

<body>

<div class="wrapper">

  <div class="card">

    <h2>DYNAMIS Login</h2>

    <input id="email" type="text" placeholder="Email" value="admin@dynamis.com">
    <input id="password" type="password" placeholder="Password" value="1234">

    <button onclick="login()">Login</button>

    <div class="sub">BlueCloud Technology</div>

  </div>

</div>

<script>

async function login(){

  const email = document.getElementById("email").value
  const password = document.getElementById("password").value

  try{

    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    })

    const data = await res.json()

    if(!res.ok){
      alert(data.error || "Login failed")
      return
    }

    localStorage.setItem("token", data.token)
    localStorage.setItem("clientId", data.clientId)
    localStorage.setItem("user", JSON.stringify(data.user))

    window.location.href = "/dashboard.html"

  } catch(err){
    console.error(err)
    alert("Server error")
  }
}

</script>

</body>
</html>
