<!DOCTYPE html>
<html>

<!-- demo test -->

<head>
<meta charset="UTF-8">
<title>DYNAMIS Dashboard</title>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/app.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   APP LAYOUT
========================= */
.main{
margin-left:220px;
padding:30px;
}

.container{
max-width:1400px;
margin:0 auto;
}

/* =========================
   SPLASH
========================= */
#splash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.loader{
width:40px;
height:40px;
border:4px solid #1e293b;
border-top:4px solid #3b82f6;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{ transform:rotate(360deg); }
}

/* =========================
   GRID
========================= */
.dashboard-grid{
display:grid;
grid-template-columns:repeat(4, 1fr);
gap:20px;
}

/* =========================
   NEW GRID (INTELLIGENCE)
========================= */
.grid-3{
display:grid;
grid-template-columns: repeat(3, 1fr);
gap:20px;
margin-top:20px;
}

/* =========================
   CARDS
========================= */
.card{
background: rgba(2,6,23,0.85);
border:1px solid #1e293b;
padding:15px;
border-radius:12px;
display:flex;
flex-direction:column;
min-height:200px;
}

/* KPI */
.kpi{
font-size:12px;
color:#94a3b8;
}

.kpi-value{
font-size:22px;
margin-top:8px;
color:#e2e8f0;
}

/* =========================
   PANELS
========================= */
.panel-large{ grid-column: span 2; height:280px; }
.panel-side{ grid-column: span 1; height:280px; }
.panel-half{ grid-column: span 1; height:280px; }
.panel-full{ grid-column: span 4; }

/* =========================
   CHART FIX
========================= */
.card canvas{
flex:1;
width:100% !important;
height:100% !important;
}

/* =========================
   HERO
========================= */
.hero{
background: linear-gradient(135deg,#065f46,#10b981);
border:none;
padding:25px;
font-size:24px;
border-radius:14px;
display:flex;
align-items:center;
justify-content:space-between;
}

#cfoValue{
font-size:28px;
font-weight:600;
}

/* =========================
   INTELLIGENCE UI
========================= */
.cat-block{
border-bottom:1px solid #1e293b;
padding:10px 0;
}

.row{
display:flex;
justify-content:space-between;
font-size:13px;
padding:4px 0;
}

/* =========================
   SKELETON
========================= */
.skeleton{
background:linear-gradient(90deg,#1e293b,#334155,#1e293b);
background-size:200%;
animation:shimmer 1.2s infinite;
border-radius:10px;
}

@keyframes shimmer{
0%{background-position:-200%}
100%{background-position:200%}
}

.skeleton-box{ height:60px; }

/* =========================
   HIDDEN
========================= */
.hidden{ display:none; }

</style>

</head>

<body>

<!-- SPLASH -->
<div id="splash">
<h1>DYNAMIS</h1>
<div class="loader"></div>
</div>

<!-- SIDEBAR -->
<div class="sidebar hidden" id="mainUI">

<h2>DYNAMIS</h2>

<a href="/dashboard.html">📊 Dashboard</a>
<a href="/analytics.html">📈 Analytics</a>
<a href="/revenue.html">💰 Revenue</a>
<a href="/clients.html">👥 Clients</a>

<br>
<button onclick="toggleTheme()">🌗 Theme</button>

</div>

<!-- MAIN -->
<div class="main hidden" id="mainContent">

<div class="container">

<h1 id="clientNameHeader">Dashboard</h1>

<div class="dashboard-grid">

<!-- KPI -->
<div class="card kpi">
Total Spend
<div id="valueTotal" class="kpi-value skeleton skeleton-box"></div>
</div>

<div class="card kpi">
Savings
<div id="valueSavings" class="kpi-value skeleton skeleton-box"></div>
</div>

<div class="card kpi">
Risk
<div id="valueRisk" class="kpi-value skeleton skeleton-box"></div>
</div>

<div class="card kpi">
Confidence
<div id="valueConfidence" class="kpi-value skeleton skeleton-box"></div>
</div>

<!-- CHARTS -->
<div class="card panel-large">
<canvas id="spendChart"></canvas>
</div>

<div class="card panel-side">
<canvas id="vendorChart"></canvas>
</div>

<div class="card panel-half">
<canvas id="savingsTrend"></canvas>
</div>

<!-- AI -->
<div class="card panel-half">
<div id="aiInsights"></div>
</div>

<!-- CFO -->
<div class="hero panel-full">
<div id="cfoValue">R 0</div>
<button onclick="toggleCFOMode()">Toggle Mode</button>
</div>

</div>

<!-- 🔥 NEW: INTELLIGENCE PANELS -->
<div class="grid-3">

<div class="card">
<h3>Cost Breakdown</h3>
<div id="categoryBreakdown"></div>
</div>

<div class="card">
<h3>Behaviour Analysis</h3>
<div id="behaviourInsights"></div>
</div>

<div class="card">
<h3>Top Waste Drivers</h3>
<div id="topWaste"></div>
</div>

</div>

</div>

</div>

<script src="/js/app.js"></script>
<script src="/js/dashboard.js"></script>

<script>

/* SPLASH HANDLER */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("splash").style.display="none"
document.getElementById("mainUI").classList.remove("hidden")
document.getElementById("mainContent").classList.remove("hidden")
},1000)
})

</script>

</body>
</html>
