<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DYNAMIS Initialising</title>

<style>
body{
  margin:0;
  background:#0b1220;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

.container{
  text-align:center;
}

.logo{
  font-size:34px;
  font-weight:bold;
  margin-bottom:10px;
}

.subtitle{
  color:#94a3b8;
  margin-bottom:40px;
}

.status{
  font-size:18px;
  color:#3b82f6;
  min-height:28px;
}

.loader{
  margin:30px auto;
  width:60px;
  height:60px;
  border:5px solid #1e293b;
  border-top:5px solid #3b82f6;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">DYNAMIS™</div>
  <div class="subtitle">Cloud Margin Recovery Engine</div>

  <div class="loader"></div>
  <div class="status" id="statusText">
    Initialising platform...
  </div>
</div>

<script type="module">
import { supabase } from "./supabase.js";

// SESSION GUARD
const { data: { user } } = await supabase.auth.getUser();
if(!user){
  window.location.href="login.html";
}

const messages = [
  "Analysing cloud spend...",
  "Calculating margin recovery...",
  "Assessing governance exposure...",
  "Preparing executive insights..."
];

let i = 0;
const status = document.getElementById("statusText");

const interval = setInterval(() => {
  status.textContent = messages[i];
  i++;
  if(i >= messages.length){
    clearInterval(interval);

    // Smooth transition to dashboard
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 800);
  }
}, 900);
</script>

</body>
</html>
